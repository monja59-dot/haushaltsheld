<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haushaltsheld – Kindermodus</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:"Outfit",sans-serif;
  background:#f7f2e9;
  margin:0;
  padding:20px;
  color:#2d342f;
}

.card{
  max-width:900px;
  margin:auto;
  background:#fffdfa;
  padding:30px;
  border-radius:24px;
  border:1px solid #dfd1bc;
}

h1{
  font-size:2rem;
  margin-bottom:10px;
}

.nav{
  display:grid;
  gap:12px;
  margin-top:20px;
}

.btn{
  display:block;
  padding:14px;
  border-radius:16px;
  background:#4CAF50;
  color:#fff;
  text-decoration:none;
  font-weight:700;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

  <h1>Willkommen <span id="childName">Kind</span> 👋</h1>
  <p>Das ist dein persönlicher Bereich.</p>

  <div class="nav">
    <a href="kind_aufgaben.html" class="btn">Meine Aufgaben</a>
    <a href="kind_mein_geld.html" class="btn">Mein Geld</a>
    <a href="kind_sparziel.html" class="btn">Meine Sparziele</a>
    <a href="kind_wuensche.html" class="btn">Meine Wünsche</a>
  </div>

</div>

<script>

// ===== LOGIN CHECK =====
const currentUser = JSON.parse(localStorage.getItem('haushaltsheld_user'));

if (!currentUser || currentUser.role !== 'child') {
  window.location.href = 'login.html';
}

// ===== AKTIVES KIND SETZEN =====
localStorage.setItem('hh_active_child', JSON.stringify(currentUser));

// ===== NAME EINSETZEN =====
document.getElementById("childName").textContent = currentUser.name;

</script>

</body>
</html>
