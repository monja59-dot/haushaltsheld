<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haushaltsheld – Kindermodus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');

:root{
  --bg:#f7f2e9;
  --bg-2:#fdf9f3;
  --card:#fffdfa;
  --line:#dfd1bc;
  --text:#2d342f;
  --muted:#7d8a82;
  --accent:#6eaf72;
  --accent-dark:#5b9960;
  --accent-soft:#eef7ef;
  --shadow-xs:0 2px 8px rgba(54,45,28,.05);
  --shadow-sm:0 6px 18px rgba(54,45,28,.08);
  --shadow-lg:0 18px 48px rgba(54,45,28,.12);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Outfit",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.6) 0%, rgba(255,255,255,0) 30%),
    linear-gradient(180deg,#fbf7f1 0%, var(--bg) 100%);
  min-height:100vh;
  padding:20px;
}

.wrapper{
  max-width:1100px;
  margin:0 auto;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:22px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand-icon{
  width:64px;
  height:64px;
  border-radius:22px;
  display:grid;
  place-items:center;
  background:linear-gradient(180deg,#fffdfa 0%, #f4ebde 100%);
  border:1px solid var(--line);
  box-shadow:var(--shadow-sm);
  overflow:hidden;
}
.brand-icon img{
  width:100%;
  height:100%;
  object-fit:contain;
  padding:4px;
}

h1{
  font-size:2rem;
  line-height:1.08;
  margin-bottom:4px;
}

.subtitle{
  color:var(--muted);
}

.card{
  background:linear-gradient(180deg,#ffffff 0%, #fffdfa 100%);
  border:1px solid rgba(223,209,188,.95);
  border-radius:30px;
  box-shadow:var(--shadow-sm);
  padding:22px;
}

.info-box{
  margin-bottom:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:18px;
}

.child-card{
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}
.child-card:hover{
  transform:translateY(-2px);
}

.child-top{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.avatar{
  width:64px;
  height:64px;
  border-radius:20px;
  display:grid;
  place-items:center;
  overflow:hidden;
  background:linear-gradient(180deg,#fffdfa 0%, #f4ebde 100%);
  border:1px solid rgba(223,209,188,.95);
  box-shadow:var(--shadow-xs);
  font-size:1.8rem;
  flex:0 0 64px;
}
.avatar img{width:100%;height:100%;object-fit:cover}

.child-name{
  font-size:1.08rem;
  font-weight:800;
}

.child-sub{
  color:var(--muted);
  font-size:.92rem;
  margin-top:2px;
}

.pin-box{
  margin-top:12px;
  display:none;
  border-top:1px solid rgba(223,209,188,.75);
  padding-top:14px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.field label{
  font-size:.93rem;
  color:#556159;
  font-weight:800;
}

.field input{
  width:100%;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid var(--line);
  background:#fffdfa;
  font-family:inherit;
  font-size:.97rem;
  color:var(--text);
  outline:none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.6);
}

.field input:focus{
  border-color:#c9dfcb;
  box-shadow:0 0 0 4px rgba(110,175,114,.10);
}

.btn,
button.btn{
  border:none;
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color:#fff !important;
  padding:13px 22px;
  border-radius:16px;
  font-size:.95rem;
  font-weight:800;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  white-space:nowrap;
  box-shadow:
    0 4px 0 #4b8250,
    0 10px 20px rgba(91,153,96,.18),
    inset 0 1px 0 rgba(255,255,255,.20);
  transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  letter-spacing:.01em;
  font-family:inherit;
  text-decoration:none;
  margin-top:12px;
  width:100%;
}

.btn-secondary{
  border:none;
  background:linear-gradient(180deg,#fffdfa 0%, #f4ebde 100%);
  color:var(--text);
  padding:13px 18px;
  border-radius:16px;
  font-size:.95rem;
  font-weight:800;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow: var(--shadow-xs);
  border:1px solid rgba(223,209,188,.95);
  font-family:inherit;
  text-decoration:none;
}

.error{
  display:none;
  margin-top:10px;
  padding:12px 14px;
  border-radius:16px;
  background:#fdeeee;
  color:#a35a5a;
  font-weight:800;
  font-size:.9rem;
  border:1px solid rgba(204,102,102,.16);
}

.empty{
  text-align:center;
  color:var(--muted);
}

.login-card{
  max-width:460px;
  margin:50px auto 0;
}

@media (max-width:860px){
  .topbar{
    flex-direction:column;
    align-items:stretch;
  }
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon"><img src="assetsschnecke.png" alt="Haushaltsheld Schnecke"></div>
      <div>
        <h1>Kindermodus</h1>
        <div class="subtitle">Wähle dein eigenes Profil und melde dich mit deiner PIN an.</div>
      </div>
    </div>
    <a class="btn-secondary" href="admin_links.html">Zum Elternbereich</a>
  </div>

  <div class="card info-box">
    <strong style="display:block;margin-bottom:6px;">Wichtig:</strong>
    <div class="subtitle">Jedes Kind hat ein eigenes Profil. Geschwister sehen nicht, was die anderen machen.</div>
  </div>

  <div id="childrenWrap" class="grid"></div>

  <div id="emptyBox" class="card login-card empty" style="display:none;">
    <h2 style="margin-bottom:8px;">Noch keine Kinderprofile vorhanden</h2>
    <div class="subtitle" style="margin-bottom:16px;">Bitte lege zuerst im Elternbereich Kinderprofile an.</div>
    <a class="btn-secondary" href="admin_links.html">Zum Elternbereich</a>
  </div>
</div>


<script>
const CHILDREN_KEY = "hh_children_profiles";
const ACTIVE_CHILD_KEY = "hh_active_child";

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function showPinBox(index){
  document.querySelectorAll(".pin-box").forEach(el => el.style.display = "none");
  const target = document.getElementById(`pinBox-${index}`);
  if(target) target.style.display = "block";
}

function loginChild(index){
  const child = (window.hhChildren || [])[index];
  const pinInput = document.getElementById(`pin-${index}`);
  const error = document.getElementById(`error-${index}`);
  if(!child || !pinInput) return;

  if(pinInput.value.trim() === String(child.pin)){
    localStorage.setItem(ACTIVE_CHILD_KEY, JSON.stringify(child));
    window.location.href = "dashboard_kind_links.html";
  } else if (error){
    error.style.display = "block";
  }
}

function renderChildren(){
  const children = JSON.parse(localStorage.getItem(CHILDREN_KEY) || "[]");
  const wrap = document.getElementById("childrenWrap");
  const emptyBox = document.getElementById("emptyBox");
  wrap.innerHTML = "";

  if(!children.length){
    emptyBox.style.display = "block";
    return;
  }

  emptyBox.style.display = "none";
  window.hhChildren = children;

  children.forEach((child, index) => {
    const card = document.createElement("div");
    card.className = "card child-card";

    const avatarHtml = child.photo
      ? `<div class="avatar"><img src="${child.photo}" alt=""></div>`
      : `<div class="avatar">${escapeHtml(child.avatar || "🧒")}</div>`;

    card.innerHTML = `
      <div class="child-top">
        ${avatarHtml}
        <div>
          <div class="child-name">${escapeHtml(child.nickname || child.name)}</div>
          <div class="child-sub">${child.nickname ? escapeHtml(child.name) + " · " : ""}Eigenes Kinderprofil</div>
        </div>
      </div>

      <div class="pin-box" id="pinBox-${index}">
        <div class="field">
          <label for="pin-${index}">PIN eingeben</label>
          <input id="pin-${index}" type="password" placeholder="4-stellige PIN">
        </div>
        <button class="btn" type="button" onclick="event.stopPropagation(); loginChild(${index})">Starten</button>
        <div class="error" id="error-${index}">Die PIN stimmt nicht.</div>
      </div>
    `;

    card.addEventListener("click", () => showPinBox(index));
    wrap.appendChild(card);
  });
}

renderChildren();
</script>

</body>
</html>
