<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haushaltsheld – Login</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f2e9;
  --card:#ffffff;
  --line:#dfd1bc;
  --text:#2d342f;
  --muted:#7d8a82;
  --accent:#4CAF50;
  --accent-dark:#3E8E41;
}

body{
  margin:0;
  font-family:"Outfit",sans-serif;
  background:linear-gradient(180deg,#fbf7f1 0%, var(--bg) 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.card{
  width:100%;
  max-width:480px;
  background:#fffdfa;
  padding:30px;
  border-radius:24px;
  border:1px solid var(--line);
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.field{
  display:grid;
  gap:6px;
  margin-bottom:14px;
}

input, select{
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:white;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h1>Login</h1>

<div class="field">
<label>Familien-Code</label>
<input type="password" id="code" value="424242">
</div>

<div class="field">
<label>Wer bist du?</label>
<select id="user"></select>
</div>

<div class="field">
<label>PIN</label>
<input type="password" id="pin">
</div>

<button onclick="login()">Anmelden</button>

</div>

<script>

if (!localStorage.getItem('haushaltsheld_users')) {
  localStorage.setItem('haushaltsheld_users', JSON.stringify([
    {name:'Mama', role:'parent', pin:'1234'},
    {name:'Papa', role:'parent', pin:'4321'},
    {name:'Kind 1', role:'child', pin:'1111'},
    {name:'Kind 2', role:'child', pin:'2222'}
  ]));
}

const users = JSON.parse(localStorage.getItem('haushaltsheld_users'));
const select = document.getElementById('user');

users.forEach((u,i)=>{
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = u.name + " (" + u.role + ")";
  select.appendChild(opt);
});

function login(){
  const user = users[select.value];
  const pin = document.getElementById('pin').value;

  if(user.pin !== pin){
    alert("Falsche PIN");
    return;
  }

  localStorage.setItem('haushaltsheld_user', JSON.stringify(user));

  if(user.role === 'parent'){
    window.location.href = 'index.html';
  } else {
    window.location.href = 'kindermodus.html';
  }
}

</script>

</body>
</html>
