<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haushaltsheld – Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f2e9;
  --card:#ffffff;
  --line:#dfd1bc;
  --text:#2d342f;
  --muted:#7d8a82;
  --accent:#4CAF50;
  --accent-dark:#3E8E41;
  --red-soft:#fdeaea;
  --blue-soft:#e9f1ff;
  --shadow-lg:0 18px 48px rgba(54,45,28,.12);
  --shadow-xs:0 2px 8px rgba(54,45,28,.05);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Outfit",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 30%),
    linear-gradient(180deg,#fbf7f1 0%, var(--bg) 100%);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:560px;
  background:linear-gradient(180deg,#ffffff 0%, #fffdfa 100%);
  border:1px solid rgba(223,209,188,.95);
  border-radius:32px;
  box-shadow:var(--shadow-lg);
  padding:38px 30px;
}

.login-header{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:12px;
  margin-bottom:26px;
  text-align:center;
}

.logo-img{
  width:90px;
  height:auto;
  object-fit:contain;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.15));
}
@media (max-width:600px){
  .logo-img{ width:70px; }
}

.login-title{
  font-size:1.95rem;
  font-weight:800;
  line-height:1.1;
}

.login-sub{
  color:var(--muted);
  font-size:.95rem;
  line-height:1.5;
}

.error-msg{
  display:none;
  padding:13px 16px;
  border-radius:18px;
  background:var(--red-soft);
  color:#a45656;
  font-weight:800;
  margin-bottom:16px;
}

.error-msg.show{display:block;}

.login-form{
  display:grid;
  gap:16px;
}

.form-group{
  display:grid;
  gap:8px;
}

.form-group label{
  font-size:.72rem;
  font-weight:800;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.08em;
}

.form-group input{
  width:100%;
  border:1.5px solid var(--line);
  background:#fffdf9;
  border-radius:18px;
  padding:14px 16px;
  font-size:.96rem;
  color:var(--text);
  outline:none;
  transition:.18s ease;
}

.form-group input:focus{
  border-color:rgba(76,175,80,.7);
  box-shadow:0 0 0 4px rgba(76,175,80,.10);
  background:#fff;
}

.user-selector{
  display:grid;
  gap:12px;
}

.user-btn{
  padding:16px;
  border:1.5px solid var(--line);
  background:linear-gradient(135deg,#fffaf4 0%, #f1e4d3 100%);
  border-radius:18px;
  font-weight:700;
  cursor:pointer;
  text-align:left;
  transition:.18s ease;
  color:var(--text);
  box-shadow:var(--shadow-xs);
}

.user-btn:hover{
  transform:translateY(-1px);
}

.user-btn.active{
  background:linear-gradient(135deg,var(--accent) 0%, var(--accent-dark) 100%);
  color:#fff;
  border-color:rgba(62,142,65,.28);
  box-shadow:0 5px 0 #2f6f33,0 12px 24px rgba(62,142,65,.18),inset 0 1px 0 rgba(255,255,255,.18);
}

.user-btn small{
  display:block;
  opacity:.8;
  font-weight:600;
  margin-top:4px;
}

.btn-login{
  border:none;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);
  color:#fff;
  padding:15px 22px;
  border-radius:18px;
  font-weight:800;
  cursor:pointer;
  width:100%;
  margin-top:6px;
  font-size:1rem;
  box-shadow:0 4px 0 #2f6f33,0 10px 22px rgba(62,142,65,.22),inset 0 1px 0 rgba(255,255,255,.20);
  transition:.18s ease;
}

.btn-login:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 0 #2f6f33,0 14px 28px rgba(62,142,65,.26),inset 0 1px 0 rgba(255,255,255,.22);
}

.info-note{
  background:var(--blue-soft);
  border:1px solid rgba(107,150,217,.14);
  border-radius:18px;
  padding:14px 16px;
  color:#58739c;
  font-weight:700;
  font-size:.88rem;
  margin-top:16px;
  line-height:1.55;
}

.empty-note{
  padding:16px;
  border-radius:18px;
  border:1px dashed var(--line);
  background:#fffaf4;
  color:var(--muted);
  font-weight:700;
  line-height:1.6;
}

@media (max-width:600px){
  .login-card{padding:28px 20px}
  .login-title{font-size:1.7rem}
}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <img src="assets/assetsschnecke.png" alt="Haushaltsheld" class="logo-img">
    <h1 class="login-title">Haushaltsheld</h1>
    <p class="login-sub">Bitte wähle dein Profil aus und melde dich mit deinem PIN an.</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <form class="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="familyCode">Familien-Code</label>
      <input type="password" id="familyCode" maxlength="6" inputmode="numeric" placeholder="Familien-Code eingeben" required />
    </div>

    <div class="form-group">
      <label>Wer bist du?</label>
      <div class="user-selector" id="userSelector"></div>
      <div class="empty-note" id="emptyState" style="display:none;">
        Es sind noch keine Nutzer angelegt. Lege zuerst im Elternbereich einen Nutzer an oder nutze die automatische Startbelegung.
      </div>
    </div>

    <div class="form-group">
      <label for="pin">PIN</label>
      <input type="password" id="pin" maxlength="4" inputmode="numeric" placeholder="4-stellige PIN" required />
    </div>

    
    <button type="submit" class="btn-login">Anmelden</button>

    <div style="text-align:center; margin-top:12px;">
      <button type="button" onclick="handleForgotPin()" style="background:none;border:none;color:#4CAF50;font-weight:700;cursor:pointer;">
        🔑 PIN vergessen?
      </button>
    </div>

  </form>

  <div class="info-note" id="infoNote">
    Beim ersten Start werden automatisch Beispiel-Nutzer angelegt, falls noch keine vorhanden sind.
  </div>
</div>

<script>
let selectedUser = null;

function readJson(key, fallback){
  try{
    const value = JSON.parse(localStorage.getItem(key));
    return value ?? fallback;
  }catch(error){
    return fallback;
  }
}

function getFamilyCode(){
  const savedAccess = readJson("haushaltsheld_family_access", null);
  if(savedAccess && savedAccess.code){
    return String(savedAccess.code);
  }
  return "424242";
}

function createUserId(){
  return "user-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2,8);
}

function calculateAge(birthdate){
  if(!birthdate) return 0;
  const birth = new Date(birthdate);
  if(Number.isNaN(birth.getTime())) return 0;
  const today = new Date();
  let age = today.getFullYear() - birth.getFullYear();
  const monthDiff = today.getMonth() - birth.getMonth();
  if(monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) age--;
  return Math.max(0, age);
}

function getDisplayAge(user){
  if(user && user.birthdate) return calculateAge(user.birthdate);
  return Number(user?.age) || 0;
}

function normalizeUsers(users){
  let changed = false;
  const normalized = (Array.isArray(users) ? users : []).map((user) => {
    const next = { ...user };
    if(!next.id){
      next.id = createUserId();
      changed = true;
    }
    if(!next.birthdate && Number(next.age) > 0){
      const year = new Date().getFullYear() - Number(next.age);
      next.birthdate = `${year}-01-01`;
      changed = true;
    }
    if(next.rights == null) next.rights = {};
    return next;
  });
  if(changed){
    localStorage.setItem("haushaltsheld_users", JSON.stringify(normalized));
  }
  return normalized;
}

function seedUsersIfNeeded(){
  const existing = readJson("haushaltsheld_users", null);
  if(existing && Array.isArray(existing) && existing.length > 0){
    return normalizeUsers(existing);
  }

  const demoUsers = [
    { id:createUserId(), name:"Anna", birthdate:"1988-01-01", role:"parent", pin:"1234", rights:{} },
    { id:createUserId(), name:"Leo", birthdate:"2017-01-01", role:"child", pin:"5678", rights:{ meinGeld:true, aufgaben:true, einkaufsliste:true, familienplaner:true, chat:true } }
  ];

  localStorage.setItem("haushaltsheld_users", JSON.stringify(demoUsers));
  return demoUsers;
}

function roleLabel(role){
  return role === "parent" ? "Eltern" : "Kind";
}

function renderUsers(){
  const users = seedUsersIfNeeded();
  const userSelector = document.getElementById("userSelector");
  const emptyState = document.getElementById("emptyState");
  userSelector.innerHTML = "";

  if(!Array.isArray(users) || users.length === 0){
    emptyState.style.display = "block";
    return [];
  }

  emptyState.style.display = "none";

  users.forEach((user, index) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "user-btn";
    const age = getDisplayAge(user);
    btn.innerHTML = `<strong>${user.name}</strong><small>${roleLabel(user.role)}${age ? " · " + age + " J." : ""}</small>`;
    btn.onclick = () => {
      selectedUser = index;
      document.querySelectorAll(".user-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
    };
    userSelector.appendChild(btn);
  });

  return users;
}

const familyCodeInput = document.getElementById("familyCode");
familyCodeInput.value = getFamilyCode();
let users = renderUsers();

const existingAuth = readJson("haushaltsheld_user", null);
if(existingAuth && existingAuth.role === "parent"){
  window.location.href = "index.html";
} else if(existingAuth && existingAuth.role === "child"){
  localStorage.setItem("hh_active_child", JSON.stringify(existingAuth));
  window.location.href = "kindermodus.html";
}


document.getElementById("pin").addEventListener("input", (e) => {
  e.target.value = e.target.value.replace(/[^0-9]/g, "");
});

document.getElementById("familyCode").addEventListener("input", (e) => {
  e.target.value = e.target.value.replace(/[^0-9]/g, "");
});

function handleLogin(event){
  event.preventDefault();

  users = renderUsers();

  const familyCode = document.getElementById("familyCode").value.trim();
  const pin = document.getElementById("pin").value.trim();
  const error = document.getElementById("errorMsg");

  error.classList.remove("show");

  if(familyCode !== getFamilyCode()){
    error.textContent = "❌ Familien-Code falsch";
    error.classList.add("show");
    return;
  }

  if(selectedUser === null){
    error.textContent = "❌ Bitte zuerst einen Nutzer auswählen";
    error.classList.add("show");
    return;
  }

  const user = users[selectedUser];

  if(!user){
    error.textContent = "❌ Dieser Nutzer existiert nicht mehr. Bitte neu auswählen.";
    error.classList.add("show");
    selectedUser = null;
    renderUsers();
    return;
  }

  if(String(user.pin) !== pin){
    error.textContent = "❌ PIN falsch";
    error.classList.add("show");
    return;
  }

  const authUser = {
    id: user.id,
    name: user.name,
    role: user.role,
    birthdate: user.birthdate || "",
    age: getDisplayAge(user),
    rights: user.rights || {}
  };

  localStorage.setItem("haushaltsheld_user", JSON.stringify(authUser));

  if(user.role === "child"){
    localStorage.setItem("hh_active_child", JSON.stringify(authUser));
    window.location.href = "kindermodus.html";
  } else {
    localStorage.removeItem("hh_active_child");
    window.location.href = "index.html";
  }
}

function handleForgotPin(){
  const users = JSON.parse(localStorage.getItem("haushaltsheld_users") || "[]");

  if(selectedUser === null){
    alert("Bitte zuerst einen Nutzer auswählen.");
    return;
  }

  const enteredFamilyCode = prompt("Bitte Familien-Code eingeben:");
  if(!enteredFamilyCode) return;

  if(enteredFamilyCode !== getFamilyCode()){
    alert("❌ Falscher Familien-Code");
    return;
  }

  const newPin = prompt("Neue 4-stellige PIN eingeben:");
  if(!newPin || newPin.length !== 4){
    alert("❌ Ungültige PIN");
    return;
  }

  users[selectedUser].pin = newPin;
  localStorage.setItem("haushaltsheld_users", JSON.stringify(users));

  alert("✅ PIN erfolgreich geändert");
}

</script>

</body>
</html>
