<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haushaltsheld – Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f2e9;
  --bg-2:#fdf9f3;
  --card:#ffffff;
  --soft:#f6efe4;
  --soft2:#efe3d2;
  --line:#dfd1bc;

  --text:#2d342f;
  --text2:#556159;
  --muted:#7d8a82;

  --accent:#4CAF50;
  --accent-dark:#3E8E41;
  --accent-soft:#e7f5e8;

  --green:#5ca66f;
  --green-soft:#e7f4ea;
  --red:#cc6666;
  --red-soft:#fdeaea;
  --blue:#6b96d9;
  --blue-soft:#e9f1ff;

  --shadow-xs:0 2px 8px rgba(54,45,28,.05);
  --shadow-sm:0 6px 18px rgba(54,45,28,.08);
  --shadow:0 12px 34px rgba(54,45,28,.10);
  --shadow-lg:0 18px 48px rgba(54,45,28,.12);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;overflow-x:hidden}

body{
  font-family:"Outfit",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 30%),
    linear-gradient(180deg,#fbf7f1 0%, var(--bg) 100%);
  color:var(--text);
  min-height:100vh;
  font-size:16px;
  line-height:1.6;
  letter-spacing:-0.01em;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

h1,h2,h3,h4,h5,h6{
  font-family:"Outfit",sans-serif;
  letter-spacing:-0.03em;
  line-height:1.15;
}

button,input,select,textarea{font:inherit}

.login-container{
  width:100%;
  max-width:520px;
}

.login-card{
  background:linear-gradient(180deg,#ffffff 0%, #fffdfa 100%);
  border:1px solid rgba(223,209,188,.95);
  border-radius:32px;
  box-shadow:var(--shadow-lg);
  padding:40px 32px;
}

.login-header{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:28px;
  flex-direction:column;
  gap:12px;
}

.logo-img{
  width:64px;
  height:64px;
  object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(62,142,65,.14));
}

.login-title{
  font-size:1.8rem;
  font-weight:800;
  color:var(--text);
  text-align:center;
}

.login-subtitle{
  font-size:.9rem;
  color:var(--muted);
  text-align:center;
}

.login-form{
  display:grid;
  gap:16px;
  margin-bottom:24px;
}

.form-group{
  display:grid;
  gap:8px;
}

.form-group label{
  font-size:.72rem;
  font-weight:800;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.08em;
}

.form-group input{
  width:100%;
  border:1.5px solid var(--line);
  background:#fffdf9;
  border-radius:18px;
  padding:14px 16px;
  font-size:.95rem;
  color:var(--text);
  outline:none;
  transition:.18s ease;
  min-height:48px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
}

.form-group input:focus{
  border-color:rgba(76,175,80,.7);
  box-shadow:0 0 0 4px rgba(76,175,80,.10);
  background:#fff;
}

.user-selector{
  display:grid;
  gap:12px;
  margin-bottom:8px;
  max-height:300px;
  overflow-y:auto;
  min-height:100px;
}

.user-btn{
  padding:16px;
  border:1.5px solid var(--line);
  background:linear-gradient(135deg,#fffaf4 0%, #f1e4d3 100%);
  border-radius:18px;
  color:#665646;
  font-weight:700;
  font-size:.95rem;
  cursor:pointer;
  transition:.18s ease;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:6px;
  box-shadow:0 3px 0 #cdb394, 0 8px 18px rgba(110,82,40,.10), inset 0 1px 0 rgba(255,255,255,.72);
  text-align:left;
}

.user-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 0 #cdb394, 0 12px 22px rgba(110,82,40,.14), inset 0 1px 0 rgba(255,255,255,.72);
}

.user-btn.active{
  background:linear-gradient(135deg,var(--accent) 0%, var(--accent-dark) 100%);
  color:#fff;
  border-color:rgba(62,142,65,.28);
  box-shadow:0 4px 0 #2f6f33, 0 12px 22px rgba(62,142,65,.25), inset 0 1px 0 rgba(255,255,255,.2);
}

.user-name{
  font-size:.95rem;
  font-weight:800;
}

.user-meta{
  font-size:.8rem;
  opacity:.8;
}

.btn-login,
button.btn-login,
a.btn-login{
  border:none;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);
  color:#fff !important;
  padding:14px 22px;
  border-radius:18px;
  font-size:.95rem !important;
  font-weight:800 !important;
  text-decoration:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  white-space:nowrap;
  box-shadow:
    0 4px 0 #2f6f33,
    0 10px 22px rgba(62,142,65,.22),
    inset 0 1px 0 rgba(255,255,255,.20);
  transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  letter-spacing:.01em;
  width:100%;
  min-height:48px;
}

.btn-login:hover,
button.btn-login:hover,
a.btn-login:hover{
  transform:translateY(-2px);
  box-shadow:
    0 6px 0 #2f6f33,
    0 14px 28px rgba(62,142,65,.26),
    inset 0 1px 0 rgba(255,255,255,.22);
  filter:brightness(1.02);
}

.btn-login:active,
button.btn-login:active,
a.btn-login:active{
  transform:translateY(1px);
  box-shadow:
    0 2px 0 #2f6f33,
    0 6px 14px rgba(62,142,65,.18),
    inset 0 1px 0 rgba(255,255,255,.16);
}

.error-msg{
  display:none;
  padding:13px 16px;
  border-radius:18px;
  background:var(--red-soft);
  border:1px solid rgba(204,102,102,.16);
  color:#a45656;
  font-weight:800;
  font-size:.9rem;
  margin-bottom:16px;
}

.error-msg.show{
  display:block;
}

.login-footer{
  text-align:center;
  color:var(--muted);
  font-size:.88rem;
  line-height:1.6;
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid rgba(223,209,188,.7);
}

.demo-note{
  background:var(--blue-soft);
  border:1px solid rgba(107,150,217,.14);
  border-radius:18px;
  padding:14px 16px;
  color:#58739c;
  font-weight:700;
  font-size:.88rem;
  margin-top:16px;
}

.demo-note strong{
  display:block;
  margin-bottom:6px;
}

.empty-users{
  text-align:center;
  padding:20px;
  color:var(--muted);
  font-size:.9rem;
}

@media(max-width:600px){
  .login-card{
    padding:28px 20px;
  }

  .login-title{
    font-size:1.6rem;
  }
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img src="assetsschnecke.png" alt="Haushaltsheld" class="logo-img">
      <h1 class="login-title">Haushaltsheld</h1>
      <p class="login-subtitle">Dein Familien-Assistent</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="familyCode">Familien-Code</label>
        <input 
          type="password" 
          id="familyCode" 
          placeholder="6-stelliger Code" 
          maxlength="6"
          inputmode="numeric"
          required
          autocomplete="off"
          value="424242"
        />
      </div>

      <div class="form-group">
        <label>Wer bist du?</label>
        <div class="user-selector" id="userSelector">
          <div class="empty-users">Lädt...</div>
        </div>
      </div>

      <div class="form-group">
        <label for="pin">PIN (4 Ziffern)</label>
        <input 
          type="password" 
          id="pin" 
          placeholder="z. B. 1234" 
          maxlength="4"
          inputmode="numeric"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn-login">Anmelden</button>
    </form>

    <div class="demo-note">
      <strong>🔐 Demo-Accounts:</strong>
      Eltern: <strong>Anna</strong> (PIN: 1234)<br>
      Kind: <strong>Leo</strong> (PIN: 5678)
    </div>

    <div class="login-footer">
      💡 Wähle einen Nutzer und gib deine PIN ein.
    </div>
  </div>
</div>

<script>
const FAMILY_CODE = '424242';
let selectedUser = null;

function initDemoUsers() {
  const existingUsers = localStorage.getItem('haushaltsheld_users');
  
  if (!existingUsers) {
    const demoUsers = [
      {
        name: 'Anna',
        age: 38,
        role: 'parent',
        pin: '1234',
        rights: null,
        createdAt: new Date().toISOString()
      },
      {
        name: 'Leo',
        age: 8,
        role: 'child',
        pin: '5678',
        rights: {
          meinGeld: true,
          aufgaben: true,
          einkaufsliste: false,
          familienplaner: false
        },
        createdAt: new Date().toISOString()
      }
    ];
    
    localStorage.setItem('haushaltsheld_users', JSON.stringify(demoUsers));
  }
}

function loadUsers() {
  const users = JSON.parse(localStorage.getItem('haushaltsheld_users')) || [];
  const userSelector = document.getElementById('userSelector');

  if (users.length === 0) {
    userSelector.innerHTML = '<div class="empty-users">Keine Nutzer vorhanden.</div>';
    return;
  }

  userSelector.innerHTML = users.map((user, index) => `
    <button 
      type="button" 
      class="user-btn" 
      data-index="${index}"
      onclick="selectUser(${index}, '${user.name}', '${user.role}')"
    >
      <span class="user-name">${user.name}</span>
      <span class="user-meta">${user.age} Jahre • ${user.role === 'parent' ? '👨‍👩‍👧 Eltern' : '🧒 Kind'}</span>
    </button>
  `).join('');
}

function selectUser(index, name, role) {
  selectedUser = { index, name, role };
  document.querySelectorAll('.user-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  document.querySelector(`[data-index="${index}"]`).classList.add('active');
}

function showError(message) {
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.textContent = message;
  errorMsg.classList.add('show');
  setTimeout(() => {
    errorMsg.classList.remove('show');
  }, 4000);
}

function handleLogin(event) {
  event.preventDefault();

  const familyCode = document.getElementById('familyCode').value;
  const pin = document.getElementById('pin').value;

  if (!familyCode || !pin) {
    showError('Bitte alle Felder ausfüllen');
    return;
  }

  if (familyCode !== FAMILY_CODE) {
    showError('Familien-Code ist falsch');
    return;
  }

  if (!selectedUser) {
    showError('Bitte einen Nutzer auswählen');
    return;
  }

  if (pin.length !== 4 || isNaN(pin)) {
    showError('PIN muss 4 Ziffern sein');
    return;
  }

  const users = JSON.parse(localStorage.getItem('haushaltsheld_users')) || [];
  const user = users[selectedUser.index];

  if (!user || user.pin !== pin) {
    showError('PIN ist falsch');
    return;
  }

  const userData = {
    username: user.name.toLowerCase(),
    name: user.name,
    age: user.age,
    role: user.role,
    loginTime: new Date().toISOString(),
    rights: user.rights || null,
    familyCode: FAMILY_CODE
  };

  localStorage.setItem('haushaltsheld_user', JSON.stringify(userData));
  localStorage.setItem('haushaltsheld_session', 'active');

  if (user.role === 'parent') {
    window.location.href = 'index.html';
  } else {
    window.location.href = 'kindermodus.html';
  }
}

// Startup
document.addEventListener('DOMContentLoaded', function() {
  const session = localStorage.getItem('haushaltsheld_session');
  if (session === 'active') {
    const user = JSON.parse(localStorage.getItem('haushaltsheld_user'));
    if (user && user.role === 'parent') {
      window.location.href = 'index.html';
      return;
    } else if (user && user.role === 'child') {
      window.location.href = 'kindermodus.html';
      return;
    }
  }

  // Initialisiere Demo-Nutzer
  initDemoUsers();
  // Lade Nutzer in UI
  loadUsers();

  // Input Filter
  document.getElementById('familyCode').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
  });

  document.getElementById('pin').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
  });
});
</script>

</body>
</html>
