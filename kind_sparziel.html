<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Meine Sparziele – Haushaltsheld</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
:root{
  --bg:#f7f2e9;
  --bg-2:#fdf9f3;
  --card:#ffffff;
  --soft:#f6efe4;
  --soft2:#efe3d2;
  --line:#dfd1bc;
  --text:#2d342f;
  --text2:#556159;
  --muted:#7d8a82;
  --accent:#4CAF50;
  --accent-dark:#3E8E41;
  --accent-soft:#e7f5e8;
  --green:#5ca66f;
  --green-soft:#e7f4ea;
  --red:#cc6666;
  --red-soft:#fdeaea;
  --yellow:#b5882f;
  --yellow-soft:#fbf4df;
  --blue:#6b96d9;
  --blue-soft:#e9f1ff;
  --brown:#4d3c2c;
  --brown-dark:#433324;
  --shadow-xs:0 2px 8px rgba(54,45,28,.05);
  --shadow-sm:0 6px 18px rgba(54,45,28,.08);
  --shadow:0 12px 34px rgba(54,45,28,.10);
  --shadow-lg:0 18px 48px rgba(54,45,28,.12);
  --r-sm:16px;--r:22px;--r-lg:28px;--r-xl:34px;
  --sidebar-w:248px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;overflow-x:hidden}
body{
  font-family:"Outfit",sans-serif;
  background:
    radial-gradient(circle at top left,rgba(255,255,255,.55) 0%,rgba(255,255,255,0) 30%),
    linear-gradient(180deg,#fbf7f1 0%,var(--bg) 100%);
  color:var(--text);min-height:100vh;font-size:16px;line-height:1.6;
}
button,input,select,textarea{font:inherit}
/* ── App shell ── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
/* ── Sidebar ── */
.sidebar{
  background:linear-gradient(180deg,#FBFDFB 0%,#F2F7F2 100%);
  border-right:1px solid var(--line);
  padding:24px 16px 20px;
  display:flex;flex-direction:column;gap:4px;
  position:sticky;top:0;height:100vh;overflow-y:auto;z-index:10;
}
.logo-wrap{
  display:flex;align-items:center;gap:11px;
  padding:0 6px 20px;border-bottom:1px solid var(--line);margin-bottom:10px;
}
.logo-img{
  width:46px;height:46px;border-radius:15px;
  overflow:hidden;background:#fff;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:var(--shadow-xs);
}
.logo-img img{width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply}
.logo-name{font-weight:800;font-size:1.12rem;color:var(--text);line-height:1.2}
.logo-sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.nav-lbl{
  font-size:.68rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);padding:12px 10px 5px;
}
.nav{display:flex;flex-direction:column;gap:3px}
.nav a{
  display:flex;align-items:center;gap:12px;
  padding:11px 13px;border-radius:18px;
  text-decoration:none;color:var(--text2);
  font-weight:700;font-size:.96rem;
  border:1px solid transparent;
  transition:all .18s ease;
}
.nav a:hover{
  background:rgba(255,255,255,.72);
  border-color:rgba(223,209,188,.9);
  transform:translateX(2px);box-shadow:var(--shadow-xs);
  color:var(--text);
}
.nav a.active{
  background:linear-gradient(135deg,#58b95d 0%,#3e8e41 100%);
  color:#fff !important;
  border-color:rgba(62,142,65,.28);
  box-shadow:0 5px 0 #2f6f33,0 14px 26px rgba(62,142,65,.20),inset 0 1px 0 rgba(255,255,255,.18);
}
.nav-icon{
  width:36px;height:36px;border-radius:12px;
  display:grid;place-items:center;flex-shrink:0;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(223,209,188,.92);
  color:var(--accent-dark);
  box-shadow:0 2px 6px rgba(54,45,28,.05),inset 0 1px 0 rgba(255,255,255,.7);
}
.nav a.active .nav-icon{
  background:rgba(255,255,255,.16);
  border-color:rgba(255,255,255,.22);
  color:#fff;box-shadow:none;
}
.nav-icon svg{width:18px;height:18px;stroke:currentColor}
.sb-footer{margin-top:auto;padding-top:18px;border-top:1px solid var(--line)}
.logout-btn{
  width:100%;border:none;
  background:linear-gradient(180deg,#fffdfa,#f4ebde);
  color:var(--text2);padding:12px;border-radius:16px;
  font-family:inherit;font-size:.88rem;font-weight:700;
  cursor:pointer;border:1px solid var(--line);
  box-shadow:var(--shadow-xs);transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.logout-btn svg{width:16px;height:16px;stroke:currentColor}
.logout-btn:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
/* ── Main ── */
.main{padding:28px 28px 40px;overflow-x:hidden}
.page-header{margin-bottom:24px}
.page-header h1{font-size:1.9rem;font-weight:900;letter-spacing:-.04em;margin-bottom:5px;color:var(--text)}
.page-header p{color:var(--muted);font-size:.95rem}
/* ── Cards ── */
.card{
  background:linear-gradient(145deg,#ffffff 0%,#f9f6f1 100%);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  box-shadow:0 8px 22px rgba(54,45,28,.07),0 2px 5px rgba(54,45,28,.04);
  padding:22px;
  margin-bottom:18px;
  transition:transform .15s,box-shadow .15s;
}
.card:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(54,45,28,.10),0 3px 8px rgba(54,45,28,.05)}
.card-title{
  display:flex;align-items:center;gap:11px;
  font-size:1.05rem;font-weight:800;color:var(--text);
  margin-bottom:16px;
}
.card-icon{
  width:36px;height:36px;border-radius:12px;
  display:grid;place-items:center;flex-shrink:0;
  box-shadow:0 2px 6px rgba(54,45,28,.07),inset 0 1px 0 rgba(255,255,255,.8);
}
.card-icon svg{width:18px;height:18px;stroke:currentColor}
.ci-green{background:#e8f5e9;border:1px solid #c8e6ca;color:#357a38}
.ci-blue{background:#e9f1ff;border:1px solid #c5d9f5;color:#3d5c9a}
.ci-yellow{background:#fbf4df;border:1px solid #e8d89a;color:#8a6a1e}
.ci-purple{background:#f0eaff;border:1px solid #d4bff5;color:#6a45b0}
.ci-red{background:#fdeaea;border:1px solid #f0c8c8;color:#a35a5a}
/* ── Buttons ── */
.btn{
  border:none;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);
  color:#fff !important;
  padding:13px 22px;border-radius:16px;
  font-size:.95rem;font-weight:800;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  white-space:nowrap;
  box-shadow:0 4px 0 #2f6f33,0 10px 22px rgba(62,142,65,.24),inset 0 1px 0 rgba(255,255,255,.20);
  transition:transform .12s,box-shadow .12s;
  letter-spacing:.01em;text-decoration:none;font-family:inherit;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #2f6f33,0 14px 28px rgba(62,142,65,.28),inset 0 1px 0 rgba(255,255,255,.22)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #2f6f33,0 4px 10px rgba(62,142,65,.18)}
.btn-sec{
  border:none;
  background:linear-gradient(180deg,#fffdfa 0%,#f4ebde 100%);
  color:var(--text);padding:12px 18px;border-radius:16px;
  font-size:.92rem;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  box-shadow:var(--shadow-xs);border:1px solid var(--line);
  transition:.15s;font-family:inherit;text-decoration:none;
}
.btn-sec:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
/* ── Inputs ── */
.inp{
  width:100%;border:1.5px solid var(--line);
  background:#fffdf9;border-radius:var(--r-sm);
  padding:13px 16px;font-family:inherit;font-size:.96rem;
  color:var(--text);outline:none;transition:.15s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
}
.inp:focus{border-color:#9ecfa0;box-shadow:0 0 0 4px rgba(76,175,80,.10),inset 0 1px 0 rgba(255,255,255,.7)}
/* ── Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* ── Empty ── */
.empty{text-align:center;padding:28px 20px;color:var(--muted);font-size:.9rem;line-height:1.6}
/* ── Responsive ── */
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;flex-direction:row;flex-wrap:wrap;padding:14px 12px;gap:0}
  .logo-wrap{padding-bottom:0;border-bottom:none;margin-bottom:0;border-right:1px solid var(--line);padding-right:14px;margin-right:14px}
  .nav{flex-direction:row;flex-wrap:wrap;flex:1}
  .nav a{flex:0 1 auto;padding:8px 10px;font-size:.8rem}
  .sb-footer,.nav-lbl{display:none}
  .grid2{grid-template-columns:1fr}
}
@media(max-width:600px){.main{padding:16px}}
</style>
<style>
.goal-card{background:linear-gradient(145deg,#fff,#f9f6f1);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;transition:.15s}
.goal-card:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(54,45,28,.09)}
.goal-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.goal-emoji{font-size:1.8rem;flex-shrink:0;line-height:1}
.goal-name{font-size:1rem;font-weight:800;flex:1;color:var(--text)}
.goal-pct{font-size:.88rem;font-weight:800;color:var(--muted)}
.goal-amounts{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:8px}
.track{background:var(--soft2);border-radius:999px;height:11px;overflow:hidden}
.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#4CAF50,#66BB6A);transition:width .6s ease}
.fill.done{background:linear-gradient(90deg,#f5c842,#d4a020)}
.goal-note{font-size:.78rem;color:var(--muted);margin-top:7px}
.goal-actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;align-items:center}
.save-inp{flex:1;min-width:80px;border:1.5px solid var(--line);background:#fffdf9;border-radius:12px;padding:9px 12px;font-family:inherit;font-size:.84rem;color:var(--text);outline:none}
.save-inp:focus{border-color:#9ecfa0}
.save-btn{border:none;background:linear-gradient(135deg,#4CAF50,#3E8E41);color:#fff;padding:9px 14px;border-radius:12px;font-family:inherit;font-size:.84rem;font-weight:800;cursor:pointer;box-shadow:0 3px 0 #2f6f33,0 6px 12px rgba(62,142,65,.2);transition:.12s}
.save-btn:hover{transform:translateY(-1px)}
.del-btn{border:1.5px solid #f0c8c8;background:#fdeaea;color:#a35a5a;padding:9px 12px;border-radius:12px;font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:5px}
.del-btn:hover{background:#fad4d4}
.del-btn svg{width:14px;height:14px}
.add-form{background:var(--accent-soft);border:1px solid #c8e6ca;border-radius:var(--r);padding:18px;margin-top:4px}
.add-form-title{font-size:.95rem;font-weight:800;color:#357a38;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field-lbl{font-size:.8rem;font-weight:800;color:var(--text2);display:block;margin-bottom:6px}
.emoji-select{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.emoji-opt{width:38px;height:38px;border:2px solid var(--line);border-radius:11px;background:#fff;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;transition:.14s}
.emoji-opt:hover{border-color:#9ecfa0;background:#f0f8f0}
.emoji-opt.sel{border-color:#4CAF50;background:#eef7ef;box-shadow:0 0 0 3px rgba(76,175,80,.15)}
</style>
</head>

<script>

const ACTIVE_CHILD_KEY = "hh_active_child";

function getActiveChild(){
  return JSON.parse(localStorage.getItem("hh_active_child") || "null");
}
function getChildPermissions(){
  const child = getActiveChild();
  if(!child) return {};
  return JSON.parse(localStorage.getItem("perm_" + (child.id || child.name)) || "{}");
}
function hasPermission(key, fallback=true){
  const perms = getChildPermissions();
  return key in perms ? !!perms[key] : fallback;
}
function applyAIGate(){
  if(hasPermission("allowAI", true)) return;
  const fab = document.getElementById("kiFab");
  const panel = document.getElementById("kiPanel");
  if(fab) fab.style.display = "none";
  if(panel) panel.style.display = "none";
}

function doLogout(){ localStorage.removeItem(ACTIVE_CHILD_KEY); window.location.href="kindermodus.html"; }
function getChild(){ try{ return JSON.parse(localStorage.getItem(ACTIVE_CHILD_KEY)||"null"); }catch{ return null; } }
function kidKey(id,k){ return "hh_kid_"+id+"_"+k; }
function getKD(id,k,def){ try{ const v=localStorage.getItem(kidKey(id,k)); return v?JSON.parse(v):def; }catch{ return def; } }
function setKD(id,k,v){ localStorage.setItem(kidKey(id,k),JSON.stringify(v)); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmt(v){ return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2}).format(v||0); }
function checkAuth(){
  const c=getChild();
  if(!c){ window.location.href="kindermodus.html"; return null; }
  return c;
}
let child=null, selectedEmoji="🎯";
function selectEmoji(e,el){selectedEmoji=e;document.querySelectorAll(".emoji-opt").forEach(x=>x.classList.remove("sel"));el.classList.add("sel");}
function renderGoals(){
  if(!child) return;
  const id=child.id||child.name,goals=getKD(id,"goals",[]);
  const el=document.getElementById("goalList");
  if(!goals.length){el.innerHTML='<div class="card"><div class="empty">Noch kein Sparziel — leg unten dein erstes an!</div></div>';return;}
  el.innerHTML=goals.map((g,i)=>{
    const pct=Math.min(100,Math.round(((g.saved||0)/g.target)*100));
    const done=pct>=100;
    return '<div class="goal-card">'
      +'<div class="goal-top"><span class="goal-emoji">'+esc(g.emoji||"🎯")+'</span>'
      +'<span class="goal-name">'+esc(g.name)+'</span><span class="goal-pct">'+pct+'%</span></div>'
      +'<div class="goal-amounts"><span>Gespart: <strong>'+fmt(g.saved||0)+'</strong></span><span>Ziel: <strong>'+fmt(g.target)+'</strong></span></div>'
      +'<div class="track"><div class="fill'+(done?' done':'')+'" style="width:'+pct+'%"></div></div>'
      +'<div class="goal-note">'+(done?'Ziel erreicht! Toll gemacht!':'Noch '+fmt(g.target-(g.saved||0))+' bis zum Ziel')+'</div>'
      +'<div class="goal-actions">'
      +'<input class="save-inp" type="number" min="0.01" step="0.01" placeholder="€ dazusparen" id="save_'+i+'">'
      +'<button class="save-btn" onclick="addToGoal('+i+')">Sparen</button>'
      +'<button class="del-btn" onclick="deleteGoal('+i+')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a35a5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg> Löschen</button>'
      +'</div></div>';
  }).join("");
}
function addToGoal(i){if(!child) return;const amt=parseFloat(document.getElementById("save_"+i).value||"0");if(isNaN(amt)||amt<=0){alert("Bitte Betrag eingeben!");return;}const id=child.id||child.name,goals=getKD(id,"goals",[]);goals[i].saved=Math.min(goals[i].target,(goals[i].saved||0)+amt);setKD(id,"goals",goals);renderGoals();}
function deleteGoal(i){if(!confirm("Sparziel wirklich löschen?")) return;const id=child.id||child.name,goals=getKD(id,"goals",[]);goals.splice(i,1);setKD(id,"goals",goals);renderGoals();}
function addGoal(){if(!child) return;const name=document.getElementById("newGoalName").value.trim(),target=parseFloat(document.getElementById("newGoalTarget").value);if(!name||isNaN(target)||target<=0){alert("Bitte Namen und Betrag eingeben!");return;}const id=child.id||child.name,goals=getKD(id,"goals",[]);goals.push({name,target,saved:0,emoji:selectedEmoji});setKD(id,"goals",goals);document.getElementById("newGoalName").value="";document.getElementById("newGoalTarget").value="";renderGoals();}
child=checkAuth();if(child) renderGoals();
</script>

 if(!hhReadJson("haushaltsheld_child_profiles_demo",null)){localStorage.setItem("haushaltsheld_child_profiles_demo",JSON.stringify([{id:"child-1",name:"Leo",pin:"1111",age:10,role:"child"},{id:"child-2",name:"Mia",pin:"2222",age:8,role:"child"},{id:"child-3",name:"Lina",pin:"3333",age:6,role:"child"}]));}
}
document.addEventListener("DOMContentLoaded",function(){hhSeedBaseData(); const session=hhReadJson("haushaltsheld_session",null); if(!session || session.role!=="child" || !session.userId){window.location.href="kindermodus.html"; return;} let activeChild=hhReadJson("hh_active_child",null); if(!activeChild || activeChild.id!==session.userId){const children=hhReadJson("haushaltsheld_child_profiles_demo",[]); activeChild=children.find(entry=>entry.id===session.userId)||null; if(activeChild) localStorage.setItem("hh_active_child",JSON.stringify(activeChild));} ["childName","childNameCard","activeChildName","welcomeChildName"].forEach(id=>{const el=document.getElementById(id); if(el && activeChild) el.textContent=activeChild.name||"Kind";});});})();</script>
