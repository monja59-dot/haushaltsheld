<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meine Sparziele – Haushaltsheld</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap');

:root{
  --bg:#f7f2e9; --bg2:#fdf9f3; --card:#ffffff;
  --line:#dfd1bc; --text:#2d342f; --text2:#556159; --muted:#7d8a82;
  --soft:#f6efe4; --shadow-xs:0 2px 8px rgba(54,45,28,.05);
  --shadow-sm:0 6px 18px rgba(54,45,28,.08);
  --sidebar-w:260px;
  --accent:#4CAF50; --accent-dark:#388E3C; --accent-soft:#e8f5e9;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;overflow-x:hidden}

body{
  font-family:'Baloo 2',sans-serif;
  background:radial-gradient(circle at top left,rgba(255,255,255,.55) 0%,rgba(255,255,255,0) 30%),
    linear-gradient(180deg,#fbf7f1 0%,var(--bg) 100%);
  color:var(--text); min-height:100vh; font-size:16px; line-height:1.6;
}

h1,h2,h3,h4{font-family:'Baloo 2',sans-serif;letter-spacing:-0.02em;line-height:1.2;}
button,input,select,textarea{font-family:'Baloo 2',sans-serif;}

/* APP LAYOUT */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  background:linear-gradient(180deg,#f8efe3 0%,#fdf9f4 100%);
  border-right:1px solid rgba(223,209,188,.85);
  padding:20px 14px 20px; display:flex; flex-direction:column;
  gap:6px; position:sticky; top:0; height:100vh; overflow-y:auto; z-index:10;
}

/* Kind-Avatar */
.kind-avatar-wrap{
  display:flex; align-items:center; gap:12px;
  padding:12px 10px 16px; border-bottom:1px solid var(--line); margin-bottom:8px;
  cursor:pointer;
}
.kind-avatar{
  width:46px; height:46px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  display:grid; place-items:center; font-size:1.5rem;
  border:3px solid white; box-shadow:0 3px 10px rgba(62,142,65,.3);
  overflow:hidden; flex-shrink:0;
}
.kind-avatar img{width:100%;height:100%;object-fit:cover;}
.kind-name{font-size:1rem;font-weight:800;color:var(--text);line-height:1.2;}
.kind-role{font-size:.75rem;color:var(--muted);font-weight:600;}

/* NAV */
.nav-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:12px 8px 4px;}
.nav{display:flex;flex-direction:column;gap:3px;}
.nav a{
  display:flex; align-items:center; gap:10px; padding:9px 10px;
  border-radius:16px; text-decoration:none; color:var(--text2);
  font-weight:600; font-size:.95rem; transition:all .18s ease;
  border:1px solid transparent; position:relative;
}
.nav a:hover{background:rgba(255,255,255,.72);border-color:rgba(223,209,188,.9);transform:translateX(2px);}
.nav a.active{background:rgba(255,255,255,.9);border-color:rgba(223,209,188,.8);box-shadow:var(--shadow-xs);}

/* Nav Dot + Chip */
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.nav-chip{
  width:30px;height:30px;border-radius:9px;
  display:grid;place-items:center;flex-shrink:0;
}

/* Chat Badge */
.chat-badge{
  margin-left:auto; min-width:18px; height:18px; padding:0 5px;
  border-radius:999px; background:#cc6666; color:#fff;
  font-size:.65rem; font-weight:800; line-height:18px; text-align:center;
}

/* Sidebar Footer */
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);display:grid;gap:8px;}
.back-btn{
  width:100%; border:1.5px solid #ddcbb4;
  background:linear-gradient(135deg,#fffaf4 0%,#f1e4d3 100%);
  color:#665646; padding:9px 12px; border-radius:14px;
  font-size:.88rem; font-weight:800; cursor:pointer; transition:.18s ease;
  box-shadow:0 3px 0 #cdb394,0 8px 18px rgba(110,82,40,.10);
}
.logout-btn{
  width:100%; border:1.5px solid #ffcdd2;
  background:linear-gradient(135deg,#fff5f5 0%,#ffe0e0 100%);
  color:#c62828; padding:9px 12px; border-radius:14px;
  font-size:.88rem; font-weight:800; cursor:pointer; transition:.18s ease;
  box-shadow:0 3px 0 #ef9a9a;
}

/* MAIN */
.main{width:100%;max-width:1400px;padding:28px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.page-header h1{font-size:2rem;font-weight:800;}
.page-header p{color:var(--muted);font-size:.95rem;}

/* CARD */
.card{
  background:linear-gradient(180deg,#ffffff 0%,#fffdfa 100%);
  border:1px solid rgba(223,209,188,.95);
  border-radius:24px; padding:22px; box-shadow:var(--shadow-sm);
}

/* MODE BADGE */
.mode-badge{
  display:inline-flex;align-items:center;gap:6px;padding:8px 14px;
  border-radius:999px;font-weight:800;font-size:.85rem;
  background:var(--accent-soft);border:1px solid rgba(76,175,80,.3);
  color:var(--accent-dark);
}

/* SCHNECKI ANIMATION */
@keyframes schnecki-bounce{
  0%,100%{transform:translateY(0) rotate(0deg);}
  25%{transform:translateY(-8px) rotate(-3deg);}
  75%{transform:translateY(-4px) rotate(3deg);}
}
@keyframes schnecki-pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}
.schnecki-mascot{animation:schnecki-bounce 3s ease-in-out infinite;}
.schnecki-pulse{animation:schnecki-pulse 2s ease-in-out infinite;}

/* RESPONSIVE */
@media(max-width:900px){
  .app{grid-template-columns:1fr;}
  .sidebar{height:auto;position:relative;flex-direction:row;flex-wrap:wrap;padding:12px;}
  .kind-avatar-wrap{border-bottom:none;border-right:1px solid var(--line);padding-right:14px;margin-right:14px;margin-bottom:0;padding-bottom:0;}
  .nav{flex-direction:row;flex-wrap:wrap;flex:1;}
  .nav a{flex:0 1 auto;padding:8px 10px;}
  .nav-label,.sidebar-footer{display:none;}
  .nav-dot{display:none;}
}
@media(max-width:600px){.main{padding:14px;}.page-header h1{font-size:1.7rem;}}

:root{
  --accent:#2196F3;
  --accent-dark:#1565C0;
  --accent-soft:#e3f2fd;
  --accent-text:#0d47a1;
  --accent-shadow:#1976d2;
}
.mode-badge{background:#e3f2fd;border-color:rgba(0,0,0,.1);color:#1565C0;}
.nav a.active{background:#e3f2fd;border-color:#2196F333;}
.card-accent{background:linear-gradient(135deg,#2196F3 0%,#1565C0 100%);color:#fff;}
.btn-primary{border:none;background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff;
  padding:12px 20px;border-radius:16px;font-weight:800;cursor:pointer;font-family:inherit;
  font-size:.95rem;box-shadow:0 4px 0 #1976d2,0 10px 22px #2196F333;transition:.15s ease;}
.btn-primary:hover{transform:translateY(-1px);}
.btn-soft{border:1.5px solid #2196F344;background:#e3f2fd;color:#1565C0;
  padding:10px 16px;border-radius:14px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.9rem;}
/* KI Widget Kind-Design */
.ki-fab{position:fixed;left:22px;bottom:22px;width:64px;height:64px;border-radius:50%;
  border:none;background:linear-gradient(135deg,#2196F3,#1565C0);cursor:pointer;z-index:9990;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 5px 0 #1976d2,0 12px 28px #2196F344;}
.ki-fab::before{content:'';position:absolute;inset:-8px;border-radius:50%;
  background:#2196F333;animation:kiPulse 2.2s ease-out infinite;pointer-events:none;}
@keyframes kiPulse{0%{transform:scale(1);opacity:1;}70%{transform:scale(1.5);opacity:0;}100%{transform:scale(1.5);opacity:0;}}
.ki-fab img{width:42px;height:42px;object-fit:contain;}
.ki-panel{position:fixed;left:22px;bottom:100px;width:320px;max-height:480px;
  background:#fff;border:1px solid rgba(223,209,188,.95);border-radius:24px;
  box-shadow:0 20px 60px rgba(54,45,28,.15),0 4px 0 #1976d2;
  display:flex;flex-direction:column;z-index:9991;
  opacity:0;transform:translateY(16px) scale(.96);pointer-events:none;
  transition:opacity .25s,transform .25s;overflow:hidden;}
.ki-panel.open{opacity:1;transform:none;pointer-events:all;}
.ki-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid rgba(223,209,188,.6);
  background:linear-gradient(135deg,#e3f2fd,rgba(255,255,255,.5));}
.ki-head-left{display:flex;align-items:center;gap:10px;}
.ki-head-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#2196F3,#1565C0);display:grid;place-items:center;}
.ki-head-avatar img{width:100%;height:100%;object-fit:cover;}
.ki-head h3{font-size:.95rem;font-weight:800;margin:0;color:var(--text);}
.ki-head-status{font-size:.72rem;color:#1565C0;font-weight:700;}
.ki-close{width:30px;height:30px;border-radius:10px;border:1px solid rgba(223,209,188,.8);
  background:rgba(255,255,255,.8);color:var(--muted);font-size:1.1rem;cursor:pointer;
  display:grid;place-items:center;}
.ki-chat{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.ki-msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:.88rem;line-height:1.5;font-weight:600;}
.ki-msg.bot{background:#e3f2fd;border:1px solid #2196F333;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.ki-msg.user{background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.ki-msg.ki-typing{display:flex;gap:5px;align-items:center;padding:14px;}
.ki-msg.ki-typing span{width:7px;height:7px;border-radius:50%;background:#2196F3;animation:kiDot .9s infinite;}
.ki-msg.ki-typing span:nth-child(2){animation-delay:.2s;}
.ki-msg.ki-typing span:nth-child(3){animation-delay:.4s;}
@keyframes kiDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.ki-form{display:flex;gap:8px;padding:10px 14px;border-top:1px solid rgba(223,209,188,.5);}
.ki-input{flex:1;border:1.5px solid rgba(223,209,188,.9);background:#fffdf9;border-radius:14px;
  padding:9px 14px;font-size:.88rem;outline:none;font-family:inherit;font-weight:600;}
.ki-input:focus{border-color:#2196F3;box-shadow:0 0 0 3px #2196F322;}
.ki-send{border:none;background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff;
  padding:9px 16px;border-radius:14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:.85rem;
  box-shadow:0 3px 0 #1976d2;}
/* ── App shell ── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
/* ── Sidebar ── */
.sidebar{
  background:linear-gradient(180deg,#FBFDFB 0%,#F2F7F2 100%);
  border-right:1px solid var(--line);
  padding:24px 16px 20px;
  display:flex;flex-direction:column;gap:4px;
  position:sticky;top:0;height:100vh;overflow-y:auto;z-index:10;
}
.logo-wrap{
  display:flex;align-items:center;gap:11px;
  padding:0 6px 20px;border-bottom:1px solid var(--line);margin-bottom:10px;
}
.logo-img{
  width:46px;height:46px;border-radius:15px;
  overflow:hidden;background:#fff;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:var(--shadow-xs);
}
.logo-img img{width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply}
.logo-name{font-weight:800;font-size:1.12rem;color:var(--text);line-height:1.2}
.logo-sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.nav-lbl{
  font-size:.68rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);padding:12px 10px 5px;
}
.nav{display:flex;flex-direction:column;gap:3px}
.nav a{
  display:flex;align-items:center;gap:12px;
  padding:11px 13px;border-radius:18px;
  text-decoration:none;color:var(--text2);
  font-weight:700;font-size:.96rem;
  border:1px solid transparent;
  transition:all .18s ease;
}
.nav a:hover{
  background:rgba(255,255,255,.72);
  border-color:rgba(223,209,188,.9);
  transform:translateX(2px);box-shadow:var(--shadow-xs);
  color:var(--text);
}
.nav a.active{
  background:linear-gradient(135deg,#58b95d 0%,#3e8e41 100%);
  color:#fff !important;
  border-color:rgba(62,142,65,.28);
  box-shadow:0 5px 0 #2f6f33,0 14px 26px rgba(62,142,65,.20),inset 0 1px 0 rgba(255,255,255,.18);
}
.nav-icon{
  width:36px;height:36px;border-radius:12px;
  display:grid;place-items:center;flex-shrink:0;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(223,209,188,.92);
  color:var(--accent-dark);
  box-shadow:0 2px 6px rgba(54,45,28,.05),inset 0 1px 0 rgba(255,255,255,.7);
}
.nav a.active .nav-icon{
  background:rgba(255,255,255,.16);
  border-color:rgba(255,255,255,.22);
  color:#fff;box-shadow:none;
}
.nav-icon svg{width:18px;height:18px;stroke:currentColor}
.sb-footer{margin-top:auto;padding-top:18px;border-top:1px solid var(--line)}
.logout-btn{
  width:100%;border:none;
  background:linear-gradient(180deg,#fffdfa,#f4ebde);
  color:var(--text2);padding:12px;border-radius:16px;
  font-family:inherit;font-size:.88rem;font-weight:700;
  cursor:pointer;border:1px solid var(--line);
  box-shadow:var(--shadow-xs);transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.logout-btn svg{width:16px;height:16px;stroke:currentColor}
.logout-btn:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
/* ── Main ── */
.main{padding:28px 28px 40px;overflow-x:hidden}
.page-header{margin-bottom:24px}
.page-header h1{font-size:1.9rem;font-weight:900;letter-spacing:-.04em;margin-bottom:5px;color:var(--text)}
.page-header p{color:var(--muted);font-size:.95rem}
/* ── Cards ── */
.card{
  background:linear-gradient(145deg,#ffffff 0%,#f9f6f1 100%);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  box-shadow:0 8px 22px rgba(54,45,28,.07),0 2px 5px rgba(54,45,28,.04);
  padding:22px;
  margin-bottom:18px;
  transition:transform .15s,box-shadow .15s;
}
.card:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(54,45,28,.10),0 3px 8px rgba(54,45,28,.05)}
.card-title{
  display:flex;align-items:center;gap:11px;
  font-size:1.05rem;font-weight:800;color:var(--text);
  margin-bottom:16px;
}
.card-icon{
  width:36px;height:36px;border-radius:12px;
  display:grid;place-items:center;flex-shrink:0;
  box-shadow:0 2px 6px rgba(54,45,28,.07),inset 0 1px 0 rgba(255,255,255,.8);
}
.card-icon svg{width:18px;height:18px;stroke:currentColor}
.ci-green{background:#e8f5e9;border:1px solid #c8e6ca;color:#357a38}
.ci-blue{background:#e9f1ff;border:1px solid #c5d9f5;color:#3d5c9a}
.ci-yellow{background:#fbf4df;border:1px solid #e8d89a;color:#8a6a1e}
.ci-purple{background:#f0eaff;border:1px solid #d4bff5;color:#6a45b0}
.ci-red{background:#fdeaea;border:1px solid #f0c8c8;color:#a35a5a}
/* ── Buttons ── */
.btn{
  border:none;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);
  color:#fff !important;
  padding:13px 22px;border-radius:16px;
  font-size:.95rem;font-weight:800;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  white-space:nowrap;
  box-shadow:0 4px 0 #2f6f33,0 10px 22px rgba(62,142,65,.24),inset 0 1px 0 rgba(255,255,255,.20);
  transition:transform .12s,box-shadow .12s;
  letter-spacing:.01em;text-decoration:none;font-family:inherit;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #2f6f33,0 14px 28px rgba(62,142,65,.28),inset 0 1px 0 rgba(255,255,255,.22)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #2f6f33,0 4px 10px rgba(62,142,65,.18)}
.btn-sec{
  border:none;
  background:linear-gradient(180deg,#fffdfa 0%,#f4ebde 100%);
  color:var(--text);padding:12px 18px;border-radius:16px;
  font-size:.92rem;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  box-shadow:var(--shadow-xs);border:1px solid var(--line);
  transition:.15s;font-family:inherit;text-decoration:none;
}
.btn-sec:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
/* ── Inputs ── */
.inp{
  width:100%;border:1.5px solid var(--line);
  background:#fffdf9;border-radius:var(--r-sm);
  padding:13px 16px;font-family:inherit;font-size:.96rem;
  color:var(--text);outline:none;transition:.15s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
}
.inp:focus{border-color:#9ecfa0;box-shadow:0 0 0 4px rgba(76,175,80,.10),inset 0 1px 0 rgba(255,255,255,.7)}
/* ── Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* ── Empty ── */
.empty{text-align:center;padding:28px 20px;color:var(--muted);font-size:.9rem;line-height:1.6}
/* ── Responsive ── */
</style>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  if(window.lucide) lucide.createIcons();
  loadKindAvatar();
});

function doLogout(){
  localStorage.removeItem('hh_active_child');
  window.location.href = 'login.html';
}

function loadKindAvatar(){
  try{
    const child = JSON.parse(localStorage.getItem('hh_active_child')||'null');
    if(!child) return;
    const nameEl = document.getElementById('kindName');
    const avatarEl = document.getElementById('kindAvatar');
    if(nameEl) nameEl.textContent = child.nickname || child.name || 'Hallo!';
    if(avatarEl){
      if(child.photo){ avatarEl.innerHTML = '<img src="'+child.photo+'" alt="">'; }
      else { avatarEl.textContent = child.avatar || '🧒'; }
    }
  }catch(e){}
}

// Chat-Badge
(function(){
  const FAMILY_ROOM_KEY = 'hh_family_chat_room';
  const FAMILY_SEEN_KEY = 'hh_family_chat_seen_child';
  function updateBadge(){
    try{
      const child = JSON.parse(localStorage.getItem('hh_active_child')||'null');
      if(!child) return;
      const uid = child.id || child.name;
      const room = JSON.parse(localStorage.getItem(FAMILY_ROOM_KEY)||'{"messages":[]}');
      const msgs = Array.isArray(room.messages) ? room.messages : [];
      const seen = JSON.parse(localStorage.getItem(FAMILY_SEEN_KEY)||'{}');
      const lastSeen = seen[uid] || '';
      const unread = msgs.filter(m => m.senderId !== uid && String(m.timestamp||'') > String(lastSeen) && !m.deleted).length;
      const badge = document.getElementById('chatBadge');
      if(badge){ badge.style.display = unread > 0 ? 'inline-block' : 'none'; badge.textContent = unread > 99 ? '99+' : String(unread); }
    }catch(e){}
  }
  document.addEventListener('DOMContentLoaded', updateBadge);
  window.addEventListener('storage', updateBadge);
})();



const ACTIVE_CHILD_KEY = "hh_active_child";

function getActiveChild(){
  return JSON.parse(localStorage.getItem("hh_active_child") || "null");
}
function getChildPermissions(){
  const child = getActiveChild();
  if(!child) return {};
  return JSON.parse(localStorage.getItem("perm_" + (child.id || child.name)) || "{}");
}
function hasPermission(key, fallback=true){
  const perms = getChildPermissions();
  return key in perms ? !!perms[key] : fallback;
}
function applyAIGate(){
  if(hasPermission("allowAI", true)) return;
  const fab = document.getElementById("kiFab");
  const panel = document.getElementById("kiPanel");
  if(fab) fab.style.display = "none";
  if(panel) panel.style.display = "none";
}

function doLogout(){ localStorage.removeItem(ACTIVE_CHILD_KEY); window.location.href="kindermodus.html"; }
function getChild(){ try{ return JSON.parse(localStorage.getItem(ACTIVE_CHILD_KEY)||"null"); }catch{ return null; } }
function kidKey(id,k){ return "hh_kid_"+id+"_"+k; }
function getKD(id,k,def){ try{ const v=localStorage.getItem(kidKey(id,k)); return v?JSON.parse(v):def; }catch{ return def; } }
function setKD(id,k,v){ localStorage.setItem(kidKey(id,k),JSON.stringify(v)); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmt(v){ return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2}).format(v||0); }
function checkAuth(){ const ctx = window.HH_CHILD_CONTEXT; if(ctx && ctx.fullUser) return ctx.fullUser; const c=getChild(); if(!c){ window.location.href="login.html"; return null; } return c; }
let child=null, selectedEmoji="🎯";
function selectEmoji(e,el){selectedEmoji=e;document.querySelectorAll(".emoji-opt").forEach(x=>x.classList.remove("sel"));el.classList.add("sel");}
function renderGoals(){
  if(!child) return;
  const id=child.id||child.name,goals=getKD(id,"goals",[]);
  const el=document.getElementById("goalList");
  if(!goals.length){el.innerHTML='<div class="card"><div class="empty">Noch kein Sparziel — leg unten dein erstes an!</div></div>';return;}
  el.innerHTML=goals.map((g,i)=>{
    const pct=Math.min(100,Math.round(((g.saved||0)/g.target)*100));
    const done=pct>=100;
    return '<div class="goal-card">'
      +'<div class="goal-top"><span class="goal-emoji">'+esc(g.emoji||"🎯")+'</span>'
      +'<span class="goal-name">'+esc(g.name)+'</span><span class="goal-pct">'+pct+'%</span></div>'
      +'<div class="goal-amounts"><span>Gespart: <strong>'+fmt(g.saved||0)+'</strong></span><span>Ziel: <strong>'+fmt(g.target)+'</strong></span></div>'
      +'<div class="track"><div class="fill'+(done?' done':'')+'" style="width:'+pct+'%"></div></div>'
      +'<div class="goal-note">'+(done?'Ziel erreicht! Toll gemacht!':'Noch '+fmt(g.target-(g.saved||0))+' bis zum Ziel')+'</div>'
      +'<div class="goal-actions">'
      +'<input class="save-inp" type="number" min="0.01" step="0.01" placeholder="€ dazusparen" id="save_'+i+'">'
      +'<button class="save-btn" onclick="addToGoal('+i+')">Sparen</button>'
      +'<button class="del-btn" onclick="deleteGoal('+i+')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a35a5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg> Löschen</button>'
      +'</div></div>';
  }).join("");
}
function addToGoal(i){if(!child) return;const amt=parseFloat(document.getElementById("save_"+i).value||"0");if(isNaN(amt)||amt<=0){alert("Bitte Betrag eingeben!");return;}const id=child.id||child.name,goals=getKD(id,"goals",[]);goals[i].saved=Math.min(goals[i].target,(goals[i].saved||0)+amt);setKD(id,"goals",goals);renderGoals();}
function deleteGoal(i){if(!confirm("Sparziel wirklich löschen?")) return;const id=child.id||child.name,goals=getKD(id,"goals",[]);goals.splice(i,1);setKD(id,"goals",goals);renderGoals();}
function addGoal(){if(!child) return;const name=document.getElementById("newGoalName").value.trim(),target=parseFloat(document.getElementById("newGoalTarget").value);if(!name||isNaN(target)||target<=0){alert("Bitte Namen und Betrag eingeben!");return;}const id=child.id||child.name,goals=getKD(id,"goals",[]);goals.push({name,target,saved:0,emoji:selectedEmoji});setKD(id,"goals",goals);document.getElementById("newGoalName").value="";document.getElementById("newGoalTarget").value="";renderGoals();}
child=checkAuth();if(child) renderGoals();

</script>

</section>

<script>
(function(){
  var POPUP_KEY = 'hh_ki_popup_kind_sparziel';
  var PAGE_LABEL = 'Meine Sparziele';

  function loadChild(){ try{ return JSON.parse(localStorage.getItem('hh_active_child')||'null'); }catch(e){return null;} }

  var fab = document.getElementById('kiFab');
  var panel = document.getElementById('kiPanel');
  var closeBtn = document.getElementById('kiClose');
  var form = document.getElementById('kiForm');
  var input = document.getElementById('kiInput');
  var chat = document.getElementById('kiChat');
  var welcome = document.getElementById('kiWelcomeMsg');

  if(!fab||!panel) return;

  var child = loadChild();
  var childName = child ? (child.nickname||child.name||'') : '';

  if(welcome) welcome.textContent = 'Hallo '+childName+'! 👋 Ich bin Schnecki, deine Hilfsschnecke. Was möchtest du wissen?';

  function addMsg(role, text){
    var d = document.createElement('div');
    d.className = 'ki-msg '+role;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }

  fab.addEventListener('click', function(){
    panel.classList.toggle('open');
    if(panel.classList.contains('open') && input) input.focus();
  });
  if(closeBtn) closeBtn.addEventListener('click', function(){ panel.classList.remove('open'); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') panel.classList.remove('open'); });

  if(form) form.addEventListener('submit', async function(e){
    e.preventDefault();
    var msg = input.value.trim();
    if(!msg) return;
    input.value = '';
    addMsg('user', msg);
    var loading = addMsg('bot','');
    loading.classList.add('ki-typing');
    loading.innerHTML = '<span></span><span></span><span></span>';
    try{
      var res = await fetch('/.netlify/functions/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          message: msg,
          page: 'Meine Sparziele',
          mode: 'child',
          childName: childName,
          system: 'Du bist Schnecki, eine freundliche Hilfsschnecke für Kinder. Antworte kurz, einfach und kindgerecht. Benutze manchmal kleine Emojis. Erkläre Dinge so, als würdest du mit einem Kind zwischen 6 und 14 Jahren sprechen.'
        })
      });
      var data = await res.json();
      loading.classList.remove('ki-typing'); loading.innerHTML = '';
      loading.textContent = data.reply || 'Ich konnte das gerade nicht beantworten. Versuch es nochmal! 🐌';
    }catch(err){
      loading.classList.remove('ki-typing'); loading.innerHTML = '';
      loading.textContent = 'Ups, da hat etwas nicht geklappt! Versuch es nochmal. 🐌';
    }
  });
})();
</script>
