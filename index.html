<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haushaltsheld</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fffaf6;
      color: #47352c;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      background: #ffffff;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo img {
      width: 120px;
    }

    .nav a {
      display: block;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      text-decoration: none;
      color: #47352c;
      background: #fff3ea;
    }

    .nav a:hover {
      background: #ffe2cc;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .hero {
      background: #fff3ea;
      padding: 30px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hero-text {
      max-width: 60%;
    }

    .hero h1 {
      margin-top: 0;
    }

    .hero img {
      width: 200px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .card {
      margin-top: 20px;
      padding: 20px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <img src="assetsschnecke.png" alt="Schnecke">
    </div>

    <div class="nav">
      <a href="#">🏠 Dashboard</a>
      <a href="#">🧹 Aufgaben</a>
      <a href="#">🛒 Einkauf</a>
      <a href="#">💬 Assistent</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="hero">
      <div class="hero-text">
        <h1>Willkommen zurück, Monja 🐌</h1>
        <p>Deine Schnickschnack-Schnecke hilft dir beim Organisieren 💛</p>
      </div>

      <img src="assetsschnecke.png" alt="Schnecke">
    </div>

    <div class="card">
      <h3>Heute erledigen</h3>
      <ul>
        <li>Küche aufräumen</li>
        <li>Einkaufen planen</li>
        <li>Wäsche starten</li>
      </ul>
    </div>

  </div>

</div>

</body>
</html>
