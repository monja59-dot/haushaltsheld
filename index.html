<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haushaltsheld</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fffaf6;
  color: #47352c;
}

.container {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 240px;
  background: white;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.05);
}

.logo img {
  width: 100px;
  display: block;
  margin: auto;
}

.nav a {
  display: block;
  margin: 10px 0;
  padding: 12px;
  background: #fff3ea;
  border-radius: 10px;
  text-decoration: none;
  color: #47352c;
}

.main {
  flex: 1;
  padding: 25px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #fff3ea;
}

.hero img {
  width: 140px;
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <div class="logo">
      <img src="assetsschnecke.png">
    </div>

    <div class="nav">
      <a href="#">🏠 Dashboard</a>
      <a href="#">💰 Finanzen</a>
      <a href="#">🛒 Einkauf</a>
      <a href="#">🧹 Aufgaben</a>
    </div>
  </div>

  <div class="main">

    <h1>Willkommen zurück, Monja 🐌</h1>

    <div class="card hero">
      <div>
        <h2>Dein Überblick</h2>
        <p>Alles im Griff 💛</p>
      </div>
      <img src="assetsschnecke.png">
    </div>

    <div class="card">
      <h3>💰 Finanzen</h3>
      <p>Heute: -24,50 €</p>
      <p>Budget: 320 €</p>
    </div>

    <div class="card">
      <h3>🧹 Aufgaben</h3>
      <ul>
        <li>Küche aufräumen</li>
        <li>Wäsche starten</li>
      </ul>
    </div>

  </div>

</div>

</body>
</html>
