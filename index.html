<!-- NUR STYLE WURDE ÜBERARBEITET -->
<style>
:root{
  /* 🌿 NEUES DESIGN */
  --bg:#F6F7F5;
  --bg2:#FFFFFF;
  --card:#FFFFFF;
  --soft:#EDF7EE;
  --soft2:#E4F3E6;
  --line:#E5E7EB;

  --text:#1F2937;
  --text2:#4B5563;
  --muted:#6B7280;

  --accent:#4CAF50;
  --accent-dark:#3E8E41;
  --accent-soft:#A7D7A9;

  --green:#4CAF50;
  --green-soft:#E8F5E9;
  --red:#c85858;
  --red-soft:#fbe8e8;

  --shadow-sm:0 4px 12px rgba(0,0,0,.05);
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --shadow-lg:0 20px 50px rgba(0,0,0,.12);

  --r-sm:14px;
  --r:20px;
  --r-lg:26px;
  --r-xl:34px;

  --sidebar-w:248px;
}

/* BODY */
body{
  font-family:"Outfit", sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR CLEAN */
.sidebar{
  background:#ffffff;
  border-right:1px solid var(--line);
}

/* ACTIVE NAV */
.nav a.active{
  background:var(--soft);
  box-shadow:0 6px 16px rgba(76,175,80,.25);
}

/* HERO SOFT */
.hero{
  background:linear-gradient(135deg,#EDF7EE 0%,#E4F3E6 100%);
  border:none;
}

/* 💎 CARDS UPGRADE */
.card, .stat-card{
  background:linear-gradient(145deg,#ffffff,#f3f7f3);
  border:1px solid var(--line);
  border-radius:var(--r-lg);

  box-shadow:
    0 12px 30px rgba(0,0,0,.08),
    0 2px 6px rgba(0,0,0,.04);

  transition:all .25s ease;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:
    0 20px 40px rgba(0,0,0,.12),
    0 6px 12px rgba(0,0,0,.06);
}

/* 🌿 STAT VALUES */
.stat-value{
  color:var(--accent);
  font-weight:800;
}

/* 🌿 BUTTONS WOW */
.btn, button.btn, a.btn, .cta-link{
  background:linear-gradient(145deg,var(--accent),var(--accent-dark)) !important;
  color:#fff !important;
  border-radius:16px;
  font-weight:700;

  box-shadow:
    0 5px 0 #2f6f32,
    0 10px 25px rgba(76,175,80,.35),
    inset 0 1px 0 rgba(255,255,255,.2);

  transition:.2s;
}

.btn:hover, .cta-link:hover{
  transform:translateY(-2px);
}

.btn:active, .cta-link:active{
  transform:translateY(3px);
  box-shadow:
    0 2px 0 #2f6f32,
    0 4px 10px rgba(76,175,80,.3);
}

/* MODE SWITCH */
.mode-btn.active{
  background:linear-gradient(145deg,var(--accent),var(--accent-dark)) !important;
  color:#fff;
}

/* LISTS */
.list-row{
  background:var(--soft);
}

.task-item{
  background:var(--soft);
}

.task-item:hover{
  background:var(--soft2);
}

.chip{
  background:#fff;
  border:1px solid var(--line);
}

</style>
