<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Haushaltsheld – Dashboard</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Icons -->
<script src="https://unpkg.com/feather-icons"></script>

<style>

/* 🌿 MINT DESIGN SYSTEM */
:root{
  --primary:#2DD4BF;
  --primary-dark:#14B8A6;

  --bg:#F7FAFA;
  --card:#ffffff;
  --soft:#F0FDFA;

  --text:#1F2937;
  --text2:#4B5563;
  --muted:#6B7280;

  --border:#E5E7EB;

  --shadow:0 12px 30px rgba(0,0,0,.08);
  --shadow-lg:0 20px 50px rgba(0,0,0,.12);

  --r:16px;
  --r-lg:22px;

  --sidebar-w:240px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Outfit",sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* APP */
.app{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  background:#fff;
  border-right:1px solid var(--border);
  padding:20px;
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.logo-wrap img{
  width:40px;
}

.logo-name{
  font-weight:700;
}

.nav a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  color:var(--text2);
  margin-bottom:6px;
}

.nav a.active{
  background:var(--soft);
  box-shadow:0 6px 16px rgba(45,212,191,.25);
}

/* MAIN */
.main{
  padding:30px;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#ecfdf5,#d1fae5);
  padding:24px;
  border-radius:20px;
  margin-bottom:20px;
}

/* GRID */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:20px;
}

/* CARDS */
.card, .stat-card{
  background:var(--card);
  padding:20px;
  border-radius:var(--r-lg);
  border:1px solid var(--border);

  box-shadow:
    0 10px 30px rgba(0,0,0,.08),
    0 2px 6px rgba(0,0,0,.04);

  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow-lg);
}

.stat-value{
  font-size:1.8rem;
  font-weight:800;
  color:var(--primary);
}

/* LIST */
.list-row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:var(--soft);
  border-radius:10px;
  margin-bottom:8px;
}

/* CONTENT GRID */
.content-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

/* BUTTON */
.cta-link{
  display:inline-block;
  margin-top:12px;
  background:var(--primary);
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
}

/* ICON */
i{
  width:20px;
  height:20px;
  stroke:var(--primary);
}

</style>

<link rel="stylesheet" href="ki-schnecke.css">

</head>
<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo-wrap">
    <img src="assetsschnecke.png">
    <div class="logo-name">Haushaltsheld</div>
  </div>

  <nav class="nav">
    <a href="index.html" class="active"><i data-feather="home"></i>Dashboard</a>
    <a href="finanzen.html"><i data-feather="credit-card"></i>Finanzen</a>
    <a href="einkaufsliste.html"><i data-feather="shopping-cart"></i>Einkäufe</a>
    <a href="aufgaben.html"><i data-feather="check-square"></i>Aufgaben</a>
    <a href="familienplaner.html"><i data-feather="calendar"></i>Planer</a>
  </nav>
</aside>

<!-- MAIN -->
<main class="main">

  <h1>Willkommen zurück 🌿</h1>

  <section class="hero">
    Dein ruhiger Überblick über alles.
  </section>

  <!-- STATS -->
  <section class="stats-grid">

    <div class="stat-card">
      <i data-feather="credit-card"></i>
      <div>Heute ausgegeben</div>
      <div class="stat-value" id="statToday">0€</div>
    </div>

    <div class="stat-card">
      <i data-feather="bar-chart"></i>
      <div>Monat</div>
      <div class="stat-value" id="statBalance">0€</div>
    </div>

    <div class="stat-card">
      <i data-feather="check-square"></i>
      <div>Aufgaben</div>
      <div class="stat-value" id="statOpenTasks">0</div>
    </div>

    <div class="stat-card">
      <i data-feather="star"></i>
      <div>Wichtig</div>
      <div class="stat-value" id="statImportantTasks">0</div>
    </div>

  </section>

  <!-- CONTENT -->
  <section class="content-grid">

    <div class="card">
      <h3>Aufgaben</h3>
      <div id="taskList">
        <div class="list-row">Wird geladen…</div>
      </div>
      <a href="aufgaben.html" class="cta-link">Öffnen</a>
    </div>

    <div class="card">
      <h3>Finanzen</h3>
      <div id="financeList">
        <div class="list-row">Wird geladen…</div>
      </div>
      <a href="finanzen.html" class="cta-link">Öffnen</a>
    </div>

  </section>

</main>
</div>

<script>
feather.replace();
</script>

<script src="ki-schnecke.js"></script>

</body>
</html>
