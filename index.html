<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haushaltsheld</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e8f1ff, #f8fbff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 420px;
    background: white;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    overflow: hidden;
}

/* Header */
.header {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    text-align: center;
    padding: 20px;
}

.snail {
    font-size: 45px;
    animation: wiggle 2s infinite;
}

@keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(5deg); }
    75% { transform: rotate(-5deg); }
}

.header h1 {
    margin: 5px 0;
}

/* Chat */
.chatbox {
    height: 320px;
    overflow-y: auto;
    padding: 15px;
    background: #f5f7fa;
}

/* Nachrichten */
.message {
    margin: 10px 0;
    padding: 12px;
    border-radius: 15px;
    max-width: 80%;
    animation: fadeIn 0.3s ease;
}

.user {
    background: #2563eb;
    color: white;
    margin-left: auto;
}

.bot {
    background: #e4e4e4;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Chips */
.chips {
    display: flex;
    gap: 8px;
    padding: 10px;
    justify-content: center;
}

.chip {
    border: 1px solid #ccc;
    background: white;
    border-radius: 20px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
}

.chip:hover {
    background: #e8f1ff;
    transform: scale(1.05);
}

/* Input */
.input-area {
    display: flex;
    gap: 10px;
    padding: 12px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 16px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #1d4ed8;
    transform: scale(1.05);
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        <div class="snail">🐌</div>
        <h1>Haushaltsheld 💰</h1>
        <p>Dein Helfer für Sparen, Alltag & Organisation</p>
    </div>

    <div class="chatbox" id="chat">
        <div class="message bot">
            🐌 Hallo! Ich bin dein Haushaltsheld. Frag mich etwas 😊
        </div>
    </div>

    <div class="chips">
        <div class="chip" onclick="setQuestion('Wie kann ich Geld sparen?')">💰 Sparen</div>
        <div class="chip" onclick="setQuestion('Gib mir Einkaufstipps')">🛒 Einkauf</div>
        <div class="chip" onclick="setQuestion('Erstelle mir einen Plan')">📋 Plan</div>
    </div>

    <div class="input-area">
        <input id="frage" placeholder="Frag mich was..." />
        <button onclick="antwort()">Senden</button>
    </div>

</div>

<script>
function setQuestion(text) {
    document.getElementById("frage").value = text;
}

function antwort() {
    let text = document.getElementById("frage").value;
    let chat = document.getElementById("chat");

    if (!text) return;

    chat.innerHTML += `<div class="message user">${text}</div>`;
    chat.innerHTML += `<div class="message bot" id="loading">🐌 denkt nach...</div>`;
    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
        document.getElementById("loading").remove();

        let antwort;

        if (text.toLowerCase().includes("strom")) {
            antwort = "💡 Nutze LED & vermeide Standby!";
        } else if (text.toLowerCase().includes("geld")) {
            antwort = "💰 Schreib deine Ausgaben auf – das ist der Gamechanger!";
        } else if (text.toLowerCase().includes("einkauf")) {
            antwort = "🛒 Geh nie hungrig einkaufen 😄";
        } else if (text.toLowerCase().includes("plan")) {
            antwort = "📋 Plane deine Woche – spart Zeit & Stress!";
        } else {
            antwort = "🐌 Ich helfe dir beim Sparen & Planen!";
        }

        chat.innerHTML += `<div class="message bot">${antwort}</div>`;
        chat.scrollTop = chat.scrollHeight;

    }, 900);

    document.getElementById("frage").value = "";
}
</script>

</body>
</html>
