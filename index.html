<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Haushaltsheld</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }

    button:hover {
      background: #0056b3;
    }

    #aiText {
      margin-top: 20px;
      text-align: left;
      background: #f1f3f5;
      padding: 15px;
      border-radius: 10px;
      min-height: 50px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Haushaltsheld 💰</h1>

    <input id="frage" placeholder="Frag mich was..." />
    <button onclick="antwort()">Senden</button>

    <div id="aiText"></div>
  </div>

  <script>
    async function antwort() {
      let text = document.getElementById("frage").value;

      document.getElementById("aiText").innerHTML = "🤖 denkt nach...";

      const res = await fetch("/.netlify/functions/chat", {
        method: "POST",
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      document.getElementById("aiText").innerText = data.reply;
    }
  </script>

</body>
</html>
